<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Plate</title>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
      body {
        margin: 0;
        background: #fff;
      }

      model-viewer {
        width: 100vw;
        height: 100vh;
      }

      /* BIG, OBVIOUS AR BUTTON */
      .ar-button {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);

        background: black;
        color: white;
        font-size: 20px;
        padding: 16px 28px;
        border-radius: 14px;
        border: none;

        font-weight: 700;
        z-index: 999;
      }
    </style>
  </head>

  <body>

    <model-viewer
      src="burger.glb"
      ios-src="burger.usdz"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      environment-image="neutral"
      shadow-intensity="1"
      style="width: 100vw; height: 100vh;">

      <!-- THIS REPLACES the tiny default button -->
      <button slot="ar-button" class="ar-button">
        View in AR 🍽️
      </button>

    </model-viewer>

  </body>
</html>
