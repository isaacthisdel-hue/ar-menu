<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AR Menu</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #C8873A;
      --amber-soft: rgba(200,135,58,0.12);
      --amber-glow: rgba(200,135,58,0.3);
      --bg: #111009;
      --surface: #1A1812;
      --border: rgba(200,135,58,0.15);
      --border-dim: rgba(255,255,255,0.06);
      --text: #F2EDE4;
      --muted: rgba(242,237,228,0.45);
      --cream: #F2EDE4;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    model-viewer {
      position: fixed;
      width: 1px; height: 1px;
      opacity: 0; pointer-events: none;
      top: 0; left: 0;
    }

    .page {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: max(env(safe-area-inset-top), 22px);
      padding-bottom: max(env(safe-area-inset-bottom), 30px);
      padding-left: 28px;
      padding-right: 28px;
    }

    /* ── TOP LABEL ── */
    .top-label {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeDown 0.6s ease both;
    }
    .top-line { flex: 1; height: 1px; max-width: 40px; background: var(--border); }
    .top-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      opacity: 0.85;
    }

    /* ── TITLE ── */
    .title-block {
      text-align: center;
      margin-top: 16px;
      animation: fadeDown 0.6s 0.1s ease both;
    }
    .dish-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(44px, 13vw, 62px);
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.0;
      color: var(--cream);
    }
    .dish-sub {
      font-size: 12.5px;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    /* ── CENTER ── */
    .center-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* hint text */
    .tap-hint {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      animation: fadeIn 0.8s 0.5s ease both;
    }

    /* THE CIRCLE BUTTON */
    .ar-circle-btn {
      position: relative;
      width: min(66vw, 270px);
      height: min(66vw, 270px);
      border-radius: 50%;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.7s 0.2s ease both;
    }

    /* slow breathing outer ring */
    .ring-slow {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(200,135,58,0.12);
      animation: breathe-ring 4s ease-in-out infinite;
    }
    .ring-slow-2 {
      position: absolute;
      inset: -36px;
      border-radius: 50%;
      border: 1px solid rgba(200,135,58,0.06);
      animation: breathe-ring 4s 0.8s ease-in-out infinite;
    }

    /* plate circle */
    .circle-face {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at 38% 32%, rgba(200,135,58,0.1) 0%, transparent 55%),
        radial-gradient(circle at 65% 72%, rgba(200,135,58,0.05) 0%, transparent 45%),
        var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease;
      animation: plate-breathe 4s ease-in-out infinite;
    }
    .ar-circle-btn:active .circle-face {
      transform: scale(0.96);
      border-color: rgba(200,135,58,0.5);
    }

    /* soft light sweep */
    .circle-face::after {
      content: '';
      position: absolute;
      top: -40%; left: -50%;
      width: 35%; height: 180%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      transform: skewX(-15deg);
      animation: soft-sweep 5s ease-in-out infinite;
    }

    /* inner decorative ring — like a plate rim */
    .plate-rim {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 1px solid rgba(200,135,58,0.12);
      pointer-events: none;
    }

    /* brand / logo area */
    .brand-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 1;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--cream);
      line-height: 1;
      opacity: 0.92;
    }

    .brand-divider {
      width: 32px; height: 1px;
      background: var(--border);
    }

    .brand-sub {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--amber);
      opacity: 0.8;
    }

    /* ── STEPS ── */
    .steps {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 32px;
      animation: fadeUp 0.6s 0.45s ease both;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 72px;
    }
    .step-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--amber);
    }
    .step-label {
      font-size: 10.5px;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
    .step-line {
      width: 16px; height: 1px;
      background: var(--border-dim);
      margin-top: 12px;
      flex-shrink: 0;
    }

    /* ── COMPAT ── */
    .compat {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 10.5px;
      color: var(--muted);
      animation: fadeUp 0.6s 0.55s ease both;
    }
    .compat-sep { width: 2px; height: 2px; border-radius: 50%; background: var(--border); }

    /* ── KEYFRAMES ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes breathe-ring {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(1.03); }
    }
    @keyframes plate-breathe {
      0%,100% { box-shadow: 0 4px 40px rgba(200,135,58,0.08); }
      50%      { box-shadow: 0 4px 70px rgba(200,135,58,0.18); }
    }
    @keyframes soft-sweep {
      0%   { left: -50%; opacity: 0; }
      20%  { opacity: 1; }
      60%  { left: 130%; opacity: 0; }
      100% { left: 130%; opacity: 0; }
    }
  </style>
</head>
<body>

  <model-viewer
    src="burger.glb"
    ios-src="burger.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
  >
    <button slot="ar-button" id="hidden-ar-trigger" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;"></button>
  </model-viewer>

  <div class="page">

    <div class="top-label">
      <div class="top-line"></div>
      <span class="top-text">On the menu</span>
      <div class="top-line"></div>
    </div>

    <div class="title-block">
      <div class="dish-name">See it<br>on your table</div>
      <div class="dish-sub">Tap to bring this dish to life in your space</div>
    </div>

    <div class="center-wrap">

      <div class="tap-hint">Tap to preview</div>

      <button class="ar-circle-btn" onclick="launchAR()" aria-label="Preview dish in AR">
        <div class="ring-slow"></div>
        <div class="ring-slow-2"></div>

        <div class="circle-face">
          <div class="plate-rim"></div>

          <div class="brand-area">
            <div class="brand-name">TEST</div>
            <div class="brand-divider"></div>
            <div class="brand-sub">View in AR</div>
          </div>
        </div>
      </button>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-label">Tap the circle</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-label">Point at your table</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-label">See it appear</div>
        </div>
      </div>
    </div>

    <div class="compat">
      <span>Works on iPhone & Android</span>
      <span class="compat-sep"></span>
      <span>No app needed</span>
    </div>

  </div>

  <script>
    function launchAR() {
      const mv = document.querySelector('model-viewer');
      if (mv && mv.canActivateAR) {
        mv.activateAR();
      } else {
        document.getElementById('hidden-ar-trigger').click();
      }
    }
  </script>
</body>
</html>
