<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Plate</title>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
      body {
        margin: 0;
        background: #fff;
      }

      model-viewer {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>

  <body>

    <model-viewer
      src="burger.glb"
      ios-src="burger.usdz"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      environment-image="neutral"
      shadow-intensity="1">
    </model-viewer>

  </body>
</html>
